<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Log In &lsaquo; WordPress</title>
    <style>
        body { 
            background: #f1f1f1; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif; 
            color: #3c434a; 
        }
        #login { 
            width: 320px; 
            margin: 8% auto; 
            padding: 8% 0 0; 
        }
        #login form { 
            margin-top: 20px; 
            padding: 26px 24px 46px; 
            background: #fff; 
            box-shadow: 0 1px 3px rgba(0,0,0,.13); 
        }
        #login label { 
            font-size: 14px; 
            line-height: 1.5; 
            display: inline-block; 
            margin-bottom: 3px; 
        }
        .input { 
            font-size: 24px; 
            width: 100%; 
            padding: 3px; 
            margin: 2px 6px 16px 0; 
            border: 1px solid #8c8f94; 
            border-radius: 4px; 
            box-sizing: border-box; 
        }
        .submit { 
            float: right; 
        }
        .button { 
            background: #2271b1; 
            border-color: #2271b1; 
            color: #fff; 
            text-decoration: none; 
            display: inline-block; 
            font-size: 13px; 
            line-height: 2.15; 
            min-height: 30px; 
            padding: 0 10px; 
            cursor: pointer; 
            border-radius: 3px; 
        }
        .button:hover { 
            background: #135e96; 
            border-color: #135e96; 
        }
    </style>
</head>
<body class="login">
    <div id="login">
        <form name="loginform" id="loginform" action="/wp-login.php" method="post">
            <p>
                <label for="user_login">Username or Email Address</label>
                <input type="text" name="log" id="user_login" class="input" value="" size="20" autocapitalize="off" autocomplete="username" />
            </p>
            <p>
                <label for="user_pass">Password</label>
                <input type="password" name="pwd" id="user_pass" class="input" value="" size="20" autocomplete="current-password" />
            </p>
            <p class="submit">
                <input type="submit" name="wp-submit" id="wp-submit" class="button" value="Log In" />
            </p>
        </form>
    </div>
</body>
</html>
