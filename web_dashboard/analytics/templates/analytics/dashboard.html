<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MirageNet | SOC Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
        }

        .sidebar {
            background-color: #161b22;
            height: 100vh;
            overflow-y: auto;
            border-right: 1px solid #30363d;
        }

        .session-card {
            border-bottom: 1px solid #30363d;
            padding: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .session-card:hover {
            background-color: #21262d;
            border-left: 3px solid #2ea043;
        }

        .terminal-window {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            border-radius: 8px;
            height: 75vh;
            overflow-y: auto;
            border: 1px solid #333;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
        }

        .terminal-window::-webkit-scrollbar {
            width: 8px;
        }

        .terminal-window::-webkit-scrollbar-track {
            background: #0d1117;
            border-radius: 0 8px 8px 0;
        }

        .terminal-window::-webkit-scrollbar-thumb {
            background: #238636;
            border-radius: 4px;
        }

        .terminal-window::-webkit-scrollbar-thumb:hover {
            background: #2ea043;
        }

        .badge-ssh {
            background-color: #238636;
            color: white;
        }

        .badge-http {
            background-color: #1f6feb;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">

            <div class="col-md-3 sidebar p-0">
                <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
                    <h5 class="m-0 text-success">📡 Live Threats</h5>
                    <span class="badge bg-secondary">Polled via HTMX</span>
                </div>

                <div id="session-list" hx-get="/sessions-poll/" hx-trigger="every 3s" hx-swap="innerHTML">
                    {% include 'analytics/partials/session_list.html' %}
                </div>
            </div>

            <div class="col-md-9 p-4">
                <h3 class="mb-4">Global Intelligence & Tracking</h3>

                <div class="terminal-window" id="terminal-display">
                    <div class="text-muted" style="font-family: Consolas, 'Courier New', monospace;">
                        MirageNet OSINT & Terminal Surveillance System initialized.<br>
                        Waiting for session selection...<br><br>
                        > Select an active threat from the left panel to monitor their commands.
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
