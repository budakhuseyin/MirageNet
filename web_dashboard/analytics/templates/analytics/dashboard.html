<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MirageNet | SOC Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Leaflet — harita için, sadece World Map sekmesinde kullanılacak -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Chart.js — İstatistikler sekmesi için -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            background-color: #050B14;
            color: #c9d1d9;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* ── TOP NAVIGATION BAR ── */
        .top-navbar {
            height: 52px;
            background: #0A1526;
            border-bottom: 1px solid #12233D;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 8px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
        }

        .top-navbar .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: 24px;
        }

        .top-navbar .brand-text {
            font-size: 0.95rem;
            font-weight: 600;
            color: #2ea043;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .top-navbar .brand-text span {
            color: #58a6ff;
        }

        .nav-divider {
            width: 1px;
            height: 24px;
            background: #1B3358;
            margin: 0 8px;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid transparent;
            background: transparent;
            color: #8b949e;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            white-space: nowrap;
        }

        .nav-btn:hover {
            background: #12233D;
            color: #c9d1d9;
            border-color: #1B3358;
        }

        .nav-btn.active {
            background: rgba(31, 111, 235, 0.12);
            color: #58a6ff;
            border-color: #1f6feb;
            box-shadow: 0 0 10px rgba(31, 111, 235, 0.15);
        }

        .nav-btn.active-green {
            background: rgba(46, 160, 67, 0.12);
            color: #3fb950;
            border-color: #2ea043;
            box-shadow: 0 0 10px rgba(46, 160, 67, 0.15);
        }

        /* ── MAIN LAYOUT ── */
        .layout-wrapper {
            display: flex;
            height: calc(100vh - 52px);
            margin-top: 52px;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 350px;
            min-width: 350px;
            background-color: #0A1526;
            border-right: 1px solid #12233D;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 14px 16px;
            border-bottom: 1px solid #12233D;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .sidebar-header h6 {
            margin: 0;
            font-size: 0.78rem;
            font-weight: 600;
            color: #3fb950;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        #session-list {
            overflow-y: auto;
            flex: 1;
        }

        #session-list::-webkit-scrollbar {
            width: 4px;
        }

        #session-list::-webkit-scrollbar-track {
            background: #050B14;
        }

        #session-list::-webkit-scrollbar-thumb {
            background: #1B3358;
            border-radius: 4px;
        }

        .session-card {
            border-bottom: 1px solid #12233D;
            border-left: 3px solid transparent;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .session-card:hover {
            background-color: #0A1E3F;
        }

        .status-active {
            border-left: 3px solid #3fb950;
            background-color: rgba(63, 185, 80, 0.08);
        }

        .status-recent {
            border-left: 3px solid #d29922;
            background-color: rgba(210, 153, 34, 0.08);
        }

        .status-idle {
            border-left: 3px solid #30363d;
            background-color: transparent;
            opacity: 0.6;
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .dot-active {
            background-color: #3fb950;
            box-shadow: 0 0 0 2px rgba(63, 185, 80, 0.3);
            animation: pulse-green 1.8s ease-in-out infinite;
        }

        .dot-recent {
            background-color: #d29922;
            box-shadow: 0 0 4px rgba(210, 153, 34, 0.4);
        }

        .dot-idle {
            background-color: #30363d;
        }

        @keyframes pulse-green {

            0%,
            100% {
                box-shadow: 0 0 0 2px rgba(63, 185, 80, 0.3);
            }

            50% {
                box-shadow: 0 0 0 5px rgba(63, 185, 80, 0.0);
            }
        }

        .badge-ssh {
            background-color: #238636;
            color: white;
            font-size: 0.7rem;
            padding: 2px 7px;
            border-radius: 4px;
        }

        .badge-http {
            background-color: #1f6feb;
            color: white;
            font-size: 0.7rem;
            padding: 2px 7px;
            border-radius: 4px;
        }

        /* ── MAIN CONTENT ── */
        #main-content {
            flex: 1;
            overflow: auto;
            padding: 20px 24px;
        }

        #main-content::-webkit-scrollbar {
            width: 6px;
        }

        #main-content::-webkit-scrollbar-track {
            background: #050B14;
        }

        #main-content::-webkit-scrollbar-thumb {
            background: #1B3358;
            border-radius: 4px;
        }

        /* ── TERMINAL ── */
        .terminal-window {
            background-color: #000000;
            color: #3fb950;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            border-radius: 10px;
            height: calc(100vh - 110px);
            overflow-y: auto;
            border: 1px solid #12233D;
            box-shadow: 0 0 20px rgba(63, 185, 80, 0.07);
        }

        .terminal-window::-webkit-scrollbar {
            width: 6px;
        }

        .terminal-window::-webkit-scrollbar-track {
            background: #010409;
        }

        .terminal-window::-webkit-scrollbar-thumb {
            background: #238636;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <!-- TOP NAVIGATION BAR -->
    <nav class="top-navbar">
        <div class="brand">
            <span style="font-size: 1.1rem;">🛡️</span>
            <span class="brand-text">Mirage<span>Net</span></span>
        </div>
        <div class="nav-divider"></div>

        <button id="btn-terminal" class="nav-btn active-green" onclick="setActive(this)" hx-get="/view/terminal/"
            hx-target="#main-content" hx-swap="innerHTML">
            📡 Live Terminal
        </button>

        <button id="btn-map" class="nav-btn" onclick="setActive(this)" hx-get="/view/map/" hx-target="#main-content"
            hx-swap="innerHTML">
            🗺️ World Map
        </button>

        <button id="btn-stats" class="nav-btn" onclick="setActive(this)" hx-get="/view/stats/" hx-target="#main-content"
            hx-swap="innerHTML">
            📊 Statistics
        </button>

        <button id="btn-forensics" class="nav-btn" onclick="setActive(this)" hx-get="/view/forensics/"
            hx-target="#main-content" hx-swap="innerHTML">
            🕵️ Forensics
        </button>

        <button id="btn-settings" class="nav-btn" onclick="setActive(this)" hx-get="/view/settings/"
            hx-target="#main-content" hx-swap="innerHTML">
            ⚙️ Settings
        </button>
    </nav>

    <!-- MAIN LAYOUT -->
    <div class="layout-wrapper">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h6>📡 Live Threats</h6>
                <span class="badge-http" style="font-size: 0.65rem;">HTMX Poll</span>
            </div>
            <div id="session-list" hx-get="/sessions-poll/" hx-trigger="every 3s" hx-swap="innerHTML"
                hx-vals="js:{last_id: window.lastKnownAttackId || 0}">
                {% include 'analytics/partials/session_list.html' %}
            </div>
        </div>

        <!-- DYNAMIC MAIN CONTENT -->
        <div id="main-content">
            <!-- Varsayılan: Terminal Görünümü -->
            <div class="terminal-window" id="terminal-display">
                <div style="color: #8b949e; font-family: Consolas, 'Courier New', monospace;">
                    MirageNet OSINT &amp; Terminal Surveillance System initialized.<br>
                    Waiting for session selection...<br><br>
                    &gt; Select an active threat from the left panel to monitor their commands.
                </div>
            </div>
        </div>

    </div>

    <script>
        // Aktif nav butonunu yönet
        var navBtns = document.querySelectorAll('.nav-btn');

        function setActive(btn) {
            navBtns.forEach(function (b) {
                b.classList.remove('active', 'active-green');
            });
            // Harita ve terminal için farklı renk ayrımı
            if (btn.id === 'btn-terminal') {
                btn.classList.add('active-green');
            } else {
                btn.classList.add('active');
            }
        }

        // Sol panelden session'a tıklandığında (Eğer Forensics modunda değilsek) terminal view'ına dön
        document.body.addEventListener('htmx:beforeRequest', function (evt) {
            var target = evt.detail.elt;
            if (target && target.classList.contains('session-card')) {
                var isForensics = document.getElementById('btn-forensics').classList.contains('active');
                if (!isForensics) {
                    navBtns.forEach(function (b) {
                        b.classList.remove('active', 'active-green');
                    });
                    document.getElementById('btn-terminal').classList.add('active-green');
                }
            }
        });

        window.mirageCharts = []; // Chart nesnelerini tutmak icin (swaps'de destroy edilmesi lazim)

        // HTMX bir partial yüklediğinde harita veya canvas DOM'daysa init et
        document.body.addEventListener('htmx:afterSwap', function (evt) {
            // Harita ve Chart'lar sadece ana ekran degistiginde init edilmeli.
            // Soldaki HTMX polling (sessions-poll) calistiginda bu event tetikleniyor ve ekranlari bozuyordu!
            if (evt.detail.target.id !== 'main-content') return;

            var mapDiv = document.getElementById('attack-map');

            // Harita DOM'dan çıktı → eski referansı temizle ki geri dönünce yeniden init edilsin
            if (!mapDiv) {
                if (window.mirageMap) {
                    window.mirageMap.remove();
                    window.mirageMap = null;
                }
                return;
            }

            // Harita zaten init edilmiş ve container hala DOM'da → sadece boyut güncelle
            if (window.mirageMap) {
                setTimeout(function () { window.mirageMap.invalidateSize(); }, 50);
                return;
            }

            // İlk kez init
            var map = L.map('attack-map', { center: [20, 10], zoom: 2 });

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(map);

            window.mirageMap = map;

            // Tarihsel verileri haritaya dök
            var histDiv = document.getElementById('map-historical-data');
            if (histDiv) {
                var rawData = histDiv.getAttribute('data-locations');
                if (rawData) {
                    try {
                        var histData = JSON.parse(rawData);
                        histData.forEach(function (item) {
                            L.circleMarker([item.latitude, item.longitude], {
                                radius: 4,
                                fillColor: '#ff3333',
                                color: 'transparent',
                                weight: 0,
                                opacity: 0.5,
                                fillOpacity: 0.4
                            }).bindPopup("<b>Past Attack</b><br>IP: " + item.ip_address).addTo(map);
                        });
                    } catch (err) {
                        console.error("[DEBUG] Tarihsel veri parse hatası:", err);
                    }
                }
            }

        });

        // Global newAttack event dinleyici (HTMX'ten gelen datayi yakalar)
        window.lastKnownAttackId = window.lastKnownAttackId || 0;
        document.body.addEventListener('newAttack', function (evt) {
            var data = evt.detail;
            if (!data || data.lat === undefined || data.lon === undefined) return;
            if (data.lat === 0 && data.lon === 0) return; // Koordinatsiz kayitlari atla
            if (!window.mirageMap) return;

            // Bir sonraki poll'a gondermek icin son id'yi guncelle
            if (data.id) window.lastKnownAttackId = data.id;

            addRadarPulse(window.mirageMap, Number(data.lat), Number(data.lon), data.ip);
        });

        function addRadarPulse(map, lat, lon, ip) {
            var marker = L.circleMarker([lat, lon], {
                radius: 4,
                fillColor: '#ff3333',
                color: '#ffffff',
                weight: 1,
                opacity: 1,
                fillOpacity: 1
            }).addTo(map);

            marker.bindPopup(
                '<div style="font-family: Consolas, monospace; font-size: 12px;">' +
                '<span style="color: #ff4444;">&#x26A0; THREAT DETECTED</span><br>' +
                '<b>IP:</b> ' + ip + '<br>' +
                '<b>Lat/Lon:</b> ' + lat.toFixed(3) + ', ' + lon.toFixed(3) +
                '</div>'
            );

            var pulse = L.circleMarker([lat, lon], {
                radius: 4,
                fillColor: 'transparent',
                color: '#ff3333',
                weight: 2,
                opacity: 0.8,
                fillOpacity: 0
            }).addTo(map);

            var intervalId = setInterval(function () {
                var r = pulse.getRadius();
                var op = pulse.options.opacity;
                if (r < 50 && op > 0.02) {
                    pulse.setRadius(r + 1.5);
                    pulse.setStyle({ opacity: op - 0.018 });
                } else {
                    map.removeLayer(pulse);
                    clearInterval(intervalId);
                }
            }, 40);

            setTimeout(function () {
                if (map.hasLayer(marker)) map.removeLayer(marker);
            }, 15000);
        }
    </script>

</body>

</html>
